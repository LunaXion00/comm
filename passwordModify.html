<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="profile-edit-page">
    <section class="profile-edit-panel">
      <div class="profile-edit-title">
        <h1>비밀번호 수정</h1>
        <p>새 비밀번호는 기존 비밀번호와 달라야 하며, 보안 조건을 모두 만족해야 합니다.</p>
      </div>

      <form id="modifyPwForm" class="profile-edit-layout password-edit-layout" novalidate>
        <div class="profile-edit-fields">
          <div class="profile-field">
            <label for="password">새 비밀번호</label>
            <div class="password-input-row">
              <input id="password" name="password" type="password" autocomplete="new-password" />
              <button type="button" class="password-toggle-button" data-toggle-password="password">
                보기
              </button>
            </div>
            <p id="passwordHelper" class="helper-text"></p>
          </div>

          <div class="profile-field">
            <label for="passwordConfirm">새 비밀번호 확인</label>
            <div class="password-input-row">
              <input id="passwordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" />
              <button type="button" class="password-toggle-button" data-toggle-password="passwordConfirm">
                보기
              </button>
            </div>
            <p id="passwordConfirmHelper" class="helper-text"></p>
          </div>

          <div class="password-actions">
            <button type="submit">수정하기</button>
          </div>

          <p id="message" class="message"></p>
        </div>

        <aside class="password-rule-card">
          <h2>비밀번호 조건</h2>

          <ul class="password-rule-list">
            <li id="passwordLengthRule">8자 이상 20자 이하</li>
            <li id="passwordUpperRule">대문자 1개 이상 포함</li>
            <li id="passwordLowerRule">소문자 1개 이상 포함</li>
            <li id="passwordNumberRule">숫자 1개 이상 포함</li>
            <li id="passwordSpecialRule">특수문자 1개 이상 포함</li>
            <li id="passwordConfirmRule">비밀번호 확인 일치</li>
          </ul>
        </aside>
      </form>
    </section>
  </main>

  <div id="successPopup" hidden>
    수정완료
  </div>

  <script type="module" src="./js/pwModifyPage.js"></script>
</body>
</html>
