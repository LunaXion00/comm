<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="post-detail-page">
    <article id="postDetail" class="post-detail-article">
      <div id="postDetailContent"></div>

      <footer class="post-detail-like-area">
        <button
          id="likeButton"
          class="post-like-button"
          type="button"
          aria-pressed="false"
        >
          <span class="post-like-icon" aria-hidden="true">♥</span>
          <span id="likeText">좋아요</span>
          <strong id="likeCount">0</strong>
        </button>
      </footer>
    </article>

    <section id="commentWriteSection" class="post-comment-write">
      <h2>댓글 작성</h2>

      <form id="commentForm" class="post-comment-form">
        <textarea
          id="commentBody"
          name="commentBody"
          placeholder="댓글을 남겨주세요"
          required
        ></textarea>

        <button type="submit">댓글 등록</button>
      </form>
    </section>

    <section id="commentSection" class="post-comment-section">
      <div class="comment-section-title">
        <h2>
          댓글
          <span id="commentCount" class="comment-count-badge">[0]</span>
        </h2>
      </div>

      <div id="commentList"></div>
    </section>

    <p id="message" class="message"></p>
  </main>

  <div id="reportModal" class="modal-backdrop" hidden>
    <section
      class="report-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="reportModalTitle"
    >
      <h2 id="reportModalTitle">게시글 신고</h2>
      <p class="report-modal-description">
        신고 사유를 선택하고 필요한 경우 상세 내용을 입력해주세요.
      </p>

      <form id="reportForm" class="post-report-form">
        <div>
          <label for="reportReason">신고 사유</label>
          <select id="reportReason" name="reason" required>
            <option value="">신고 사유 선택</option>
          </select>
        </div>

        <div>
          <label for="reportDescription">상세 사유</label>
          <textarea
            id="reportDescription"
            name="description"
            placeholder="상세 사유를 입력하세요"
          ></textarea>
        </div>

        <p id="reportMessage" class="message" aria-live="polite"></p>

        <div class="report-actions">
          <button type="submit">신고 제출</button>
          <button
            id="reportCancelButton"
            class="secondary-button"
            type="button"
          >
            취소
          </button>
        </div>
      </form>
    </section>
  </div>

  <script type="module" src="./js/postDetailPage.js"></script>
</body>
</html>
