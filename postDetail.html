<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 상세</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="post-detail-page">
    <article id="postDetail" class="post-detail-article"></article>

    <section id="postMetaBox" class="post-detail-meta-box">
      <button id="likeButton" type="button">
        <strong id="likeCount">0</strong>
        <span id="likeText">좋아요</span>
      </button>

      <div>
        <strong id="viewCount">0</strong>
        <span>조회수</span>
      </div>

      <div>
        <strong id="commentCount">0</strong>
        <span>댓글</span>
      </div>

      <div id="reportBox" class="post-report-box">
        <button id="reportOpenButton" class="secondary-button" type="button">신고하기</button>

        <form id="reportForm" class="post-report-form" hidden>
          <label for="reportReason">신고 사유</label>
          <select id="reportReason" name="reason" required>
            <option value="">신고 사유 선택</option>
          </select>

          <label for="reportDescription">상세 사유</label>
          <textarea
            id="reportDescription"
            name="description"
            placeholder="상세 사유를 입력하세요"
          ></textarea>

          <div class="report-actions">
            <button type="submit">신고 제출</button>
            <button id="reportCancelButton" class="secondary-button" type="button">취소</button>
          </div>
        </form>
      </div>
    </section>

    <section id="commentWriteSection" class="post-comment-write">
      <h2>댓글 작성</h2>

      <form id="commentForm" class="post-comment-form">
        <textarea id="commentBody" name="commentBody" placeholder="댓글을 남겨주세요" required></textarea>
        <button type="submit">댓글 등록</button>
      </form>
    </section>

    <section id="commentSection" class="post-comment-section">
      <div class="comment-section-title">
        <h2>댓글</h2>
      </div>

      <div id="commentList"></div>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script type="module" src="./js/postDetailPage.js"></script>
</body>
</html>
