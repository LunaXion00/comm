<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="auth-page auth-page-wide">
    <section class="auth-panel">
      <div class="auth-title">
        <h1>회원가입</h1>
        <p>커뮤니티에서 사용할 계정 정보를 입력해주세요.</p>
      </div>

      <form id="signupForm" class="auth-signup-layout" novalidate>
        <div class="auth-form-fields">
          <div class="auth-field">
            <label for="signupEmail">이메일</label>
            <input id="signupEmail" name="email" type="email" autocomplete="email" />
            <p id="emailHelper" class="helper-text"></p>
          </div>

          <div class="auth-field">
            <label for="signupPassword">비밀번호</label>
            <div class="password-input-row">
              <input id="signupPassword" name="password" type="password" autocomplete="new-password" />
              <button type="button" class="password-toggle-button" data-toggle-password="signupPassword">
                보기
              </button>
            </div>
            <p id="passwordHelper" class="helper-text"></p>
          </div>

          <div class="auth-field">
            <label for="signupPasswordConfirm">비밀번호 확인</label>
            <div class="password-input-row">
              <input id="signupPasswordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" />
              <button type="button" class="password-toggle-button" data-toggle-password="signupPasswordConfirm">
                보기
              </button>
            </div>
            <p id="passwordConfirmHelper" class="helper-text"></p>
          </div>

          <div class="auth-field">
            <label for="signupNickname">닉네임</label>
            <input id="signupNickname" name="nickname" type="text" maxlength="10" />
            <p id="nicknameHelper" class="helper-text"></p>
          </div>

          <div class="auth-field">
            <label for="signupProfileImageUrl">프로필 이미지 URL</label>
            <input id="signupProfileImageUrl" name="profileImageUrl" type="text" />
            <p class="helper-text">선택 사항입니다. 비워두면 기본 이미지가 사용됩니다.</p>
          </div>

          <button type="submit">회원가입</button>
          <p id="signupMessage" class="message"></p>

          <p class="auth-switch">
            이미 계정이 있나요?
            <a href="./login.html">로그인</a>
          </p>
        </div>

        <aside class="signup-side-panel">
          <h2>프로필 미리보기</h2>

          <div class="auth-profile-preview">
            <img id="signupProfilePreviewImage" src="./assets/default-profile.png" alt="프로필 이미지 미리보기" />
          </div>

          <h2>비밀번호 조건</h2>

          <ul class="password-rule-list">
            <li id="signupPasswordLengthRule">8자 이상 20자 이하</li>
            <li id="signupPasswordUpperRule">대문자 1개 이상 포함</li>
            <li id="signupPasswordLowerRule">소문자 1개 이상 포함</li>
            <li id="signupPasswordNumberRule">숫자 1개 이상 포함</li>
            <li id="signupPasswordSpecialRule">특수문자 1개 이상 포함</li>
            <li id="signupPasswordConfirmRule">비밀번호 확인 일치</li>
          </ul>
        </aside>
      </form>
    </section>
  </main>

  <script type="module" src="./js/signupPage.js"></script>
</body>
</html>
